<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

.banner{
  width:760px;
  height:105px;
  position:relative;
  overflow:hidden;
  border-radius:0;
  border:3px solid #ffffff;
  background:linear-gradient(135deg,#020202,#090b22,#24004d,#0066ff);
  box-shadow:
    0 0 18px rgba(0,110,255,.9),
    0 0 35px rgba(140,0,255,.8);
}

.banner::before{
  content:"";
  position:absolute;
  top:-120%;
  left:-40%;
  width:140px;
  height:350%;
  background:rgba(255,255,255,.22);
  transform:rotate(25deg);
  animation:shine 4s linear infinite;
}

@keyframes shine{
  from{left:-40%;}
  to{left:120%;}
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  opacity:0;
  animation:rotateSlides 20s infinite;
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}

.mainText{
  font-size:42px;
  font-weight:900;
  font-style:italic;
  transform:skew(-14deg);
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:
    0 0 8px white,
    0 0 14px #009dff,
    0 0 26px #8b2cff;
}

.smallText{
  font-size:25px;
  font-weight:900;
  font-style:italic;
  transform:skew(-10deg);
  text-transform:uppercase;
  letter-spacing:1px;
  text-align:center;
  line-height:1.25;
  text-shadow:
    0 0 7px white,
    0 0 13px #009dff,
    0 0 22px #8b2cff;
}

@keyframes rotateSlides{
  0%{
    opacity:0;
    transform:translateX(120px);
  }
  10%,25%{
    opacity:1;
    transform:translateX(0);
  }
  35%{
    opacity:0;
    transform:translateX(-120px);
  }
  100%{
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="banner">

  <div class="slide">
    <div class="mainText">VEGA</div>
  </div>

  <div class="slide">
    <div class="mainText">Use Code: Lxvsed</div>
  </div>

  <div class="slide">
    <div class="smallText">
      PC TWEAKS IN DISCORD<br>
      LOWER LATENCY • ZERO DELAY • NO INPUT DELAY
    </div>
  </div>

  <div class="slide">
    <div class="mainText">@LXVSED ON ALL SOCIALS</div>
  </div>

</div>

</body>
</html>
